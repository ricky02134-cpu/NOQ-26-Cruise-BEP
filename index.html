<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>'26 CRUISE 손익 계산기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --primary: #534AB7; --primary-light: #EEEDFE;
    --success: #0F6E56; --error: #993C1D;
    --gray-100: #f8f9fa; --gray-200: #e9ecef; --text: #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; color: var(--text); padding: env(safe-area-inset-top) 15px; }
  .container { max-width: 500px; margin: 0 auto; padding-bottom: 40px; }
  
  /* Header & Stats */
  header { padding: 25px 0; text-align: center; }
  header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--primary); }
  
  .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; background: white; border-radius: 20px; font-size: 11px; margin-top: 8px; border: 1px solid var(--gray-200); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
  .dot.active { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }

  /* Top Dashboard Card */
  .dash-card { background: var(--primary); color: white; border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(83, 74, 183, 0.2); }
  .dash-label { font-size: 13px; opacity: 0.8; margin-bottom: 5px; }
  .dash-main { font-size: 32px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: baseline; gap: 5px; }
  .dash-main small { font-size: 16px; font-weight: 400; }
  
  .slider-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 16px; }
  input[type=range] { width: 100%; height: 6px; border-radius: 3px; accent-color: white; cursor: pointer; }
  
  /* Section Cards */
  .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 15px; display: flex; justify-content: space-between; }
  
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .input-item label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; padding-left: 2px; }
  .input-item input { width: 100%; padding: 10px; border: 1.5px solid var(--gray-100); border-radius: 10px; font-size: 14px; font-weight: 600; transition: 0.2s; }
  .input-item input:focus { border-color: var(--primary); outline: none; background: var(--primary-light); }

  .summary-row { display: flex; justify-content: space-between; padding-top: 15px; margin-top: 15px; border-top: 1px dashed var(--gray-200); font-weight: 700; }
  .total-val { color: var(--error); }
  .revenue-val { color: var(--success); }

  #bepChart { margin-top: 10px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>'26 CRUISE <span style="font-weight: 300;">PROFIT</span></h1>
    <div class="status-badge">
      <div id="sync-dot" class="dot"></div>
      <span id="sync-text">시트 연결 확인 중...</span>
    </div>
  </header>

  <div class="dash-card">
    <p class="dash-label">예상 순이익</p>
    <div class="dash-main"><span id="profit-display">0</span> <small>원</small></div>
    
    <div class="slider-box">
      <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px;">
        <span>목표 점유율</span>
        <span style="font-weight: 700;"><span id="occ-label">80</span>%</span>
      </div>
      <input type="range" id="occ-slider" min="0" max="100" value="80" oninput="updateAll()">
      <p style="font-size: 11px; margin-top: 10px; text-align: center; opacity: 0.8;">
        BEP 달성까지 <b><span id="bep-display">-</span></b>회차 공연 필요 (매진 기준)
      </p>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💸 예산 상세 분류</div>
    <div class="grid">
      <div class="input-item"><label>작품개발(로열티)</label><input type="number" id="cost_dev" oninput="updateAll()"></div>
      <div class="input-item"><label>대관료(공연+연습)</label><input type="number" id="cost_venue" oninput="updateAll()"></div>
      <div class="input-item"><label>배우 인건비</label><input type="number" id="cost_cast" oninput="updateAll()"></div>
      <div class="input-item"><label>제작 및 운영비</label><input type="number" id="cost_prod" oninput="updateAll()"></div>
      <div class="input-item"><label>홍보마케팅</label><input type="number" id="cost_mktg" oninput="updateAll()"></div>
      <div class="input-item"><label>예비비</label><input type="number" id="cost_reserve" oninput="updateAll()"></div>
    </div>
    <div class="summary-row">
      <span>총 제작비용</span>
      <span class="total-val" id="total-cost-display">0원</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🎟 티켓 및 정산</div>
    <div class="grid">
      <div class="input-item"><label>티켓 정가</label><input type="number" id="faceValue" value="50000" oninput="updateAll()"></div>
      <div class="input-item"><label>판매 수수료(%)</label><input type="number" id="commRate" value="10" oninput="updateAll()"></div>
    </div>
    <div class="summary-row">
      <span>회당 예상 매출</span>
      <span class="revenue-val" id="rev-per-show-display">0원</span>
    </div>
  </div>

  <div class="card">
    <canvas id="bepChart" height="200"></canvas>
  </div>
</div>

<script>
// 구글 시트 CSV 주소 (게시된 링크)
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_PB0S8EmyWb4sajbBesxslCR2GYjjBdRafk-vI6mDouKvqnULa4hwtSi12oCUOg/pub?gid=293246163&single=true&output=csv";

async function loadBudgetData() {
  try {
    const response = await fetch(CSV_URL);
    const text = await response.text();
    const rows = text.split('\n').map(row => row.split(','));
    
    // 이미지 예산안 인덱스에 맞춘 매핑
    const getVal = (r) => parseFloat(rows[r][9].replace(/[^0-9.-]+/g,"")) || 0;

    document.getElementById('cost_dev').value = getVal(9);    // 작품개발 소계 (10행)
    document.getElementById('cost_venue').value = getVal(14);  // 대관료 소계 (15행)
    document.getElementById('cost_cast').value = getVal(17);   // 배우 소계 (18행)
    document.getElementById('cost_prod').value = getVal(28) + getVal(41); // 제작비 + 진행비
    document.getElementById('cost_mktg').value = getVal(34);   // 홍보마케팅
    document.getElementById('cost_reserve').value = getVal(45); // 예비비

    document.getElementById('sync-dot').classList.add('active');
    document.getElementById('sync-text').innerText = "LIVE: 예산안 연동 중";
    updateAll();
  } catch (e) {
    console.error(e);
    document.getElementById('sync-text').innerText = "연결 실패 (기본값 사용)";
    updateAll();
  }
}

function updateAll() {
  const v = (id) => parseFloat(document.getElementById(id).value) || 0;
  const occ = document.getElementById('occ-slider').value;
  document.getElementById('occ-label').innerText = occ;

  const seats = 105; // 씨어터쿰 좌석 수
  const shows = 14;  // 공연 횟수
  
  // 1. 총 제작비
  const totalCost = ['cost_dev','cost_venue','cost_cast','cost_prod','cost_mktg','cost_reserve']
                    .reduce((acc, id) => acc + v(id), 0);
  document.getElementById('total-cost-display').innerText = totalCost.toLocaleString() + "원";

  // 2. 수익 계산
  const netPerTicket = v('faceValue') * (1 - v('commRate')/100);
  const totalAudience = seats * shows * (occ/100);
  const totalRev = totalAudience * netPerTicket;
  const profit = totalRev - totalCost;

  document.getElementById('profit-display').innerText = Math.round(profit).toLocaleString();
  document.getElementById('profit-display').parentElement.style.color = profit >= 0 ? '#fff' : '#ffb3b3';
  
  document.getElementById('rev-per-show-display').innerText = Math.round(totalRev/shows).toLocaleString() + "원";

  // 3. BEP 회차
  const revPerShow = (seats * netPerTicket); // 매진 기준 회당 수익
  const bepShows = totalCost / revPerShow;
  document.getElementById('bep-display').innerText = bepShows.toFixed(1);

  drawChart(totalCost, totalRev/shows, shows);
}

let myChart;
function drawChart(fixed, revPerShow, totalShows) {
  const ctx = document.getElementById('bepChart').getContext('2d');
  const labels = Array.from({length: totalShows + 1}, (_, i) => i + '회');
  const costData = Array(totalShows + 1).fill(fixed);
  const revData = labels.map((_, i) => i * revPerShow);

  if (myChart) myChart.destroy();
  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '매출', data: revData, borderColor: '#534AB7', borderWidth: 3, pointRadius: 0, fill: false, tension: 0.3 },
        { label: '제작비', data: costData, borderColor: '#e9ecef', borderDash: [5, 5], borderWidth: 2, pointRadius: 0, fill: false }
      ]
    },
    options: { 
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { 
        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
        y: { display: false }
      }
    }
  });
}

window.onload = loadBudgetData;
</script>
</body>
</html>
