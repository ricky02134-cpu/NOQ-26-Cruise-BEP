<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>'26 CRUISE 손익 분석 시뮬레이터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --primary: #534AB7; --cyan: #00B4D8; --error: #FF3B30;
    --bg: #F2F2F7; --card-bg: #FFFFFF; --text: #1C1C1E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Pretendard", sans-serif; background: var(--bg); color: var(--text); padding: 20px; font-size: 18px; }
  .container { max-width: 650px; margin: 0 auto; padding-bottom: 80px; }
  
  header { padding: 40px 0 20px; text-align: left; }
  header h1 { font-size: 34px; font-weight: 800; letter-spacing: -1px; }
  header p { font-size: 18px; color: #8E8E93; margin-top: 4px; font-weight: 500; }
  
  /* 하이라이트 대시보드 */
  .dash-card { background: var(--primary); color: white; border-radius: 32px; padding: 35px; margin-bottom: 25px; box-shadow: 0 20px 40px rgba(83, 74, 183, 0.15); transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
  .dash-label { font-size: 17px; opacity: 0.8; font-weight: 600; margin-bottom: 10px; }
  .dash-main { font-size: 48px; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; }
  
  /* 슬라이더 & 그래프 통합 섹션 */
  .visual-box { background: rgba(255,255,255,0.12); padding: 25px; border-radius: 24px; margin-top: 10px; }
  .slider-info { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; }
  .occ-val { font-size: 24px; font-weight: 800; }
  .occ-sub { font-size: 15px; opacity: 0.8; font-weight: 500; display: block; margin-top: 4px; }
  
  input[type=range] { width: 100%; height: 10px; border-radius: 5px; accent-color: white; cursor: pointer; margin: 15px 0 25px; }
  
  .chart-container { background: white; border-radius: 20px; padding: 15px; height: 250px; position: relative; }
  .bep-summary { font-size: 17px; text-align: center; margin-top: 20px; font-weight: 700; color: white; }

  /* 입력 카드 */
  .card { background: var(--card-bg); border-radius: 30px; padding: 35px; margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
  .card-title { font-size: 22px; font-weight: 800; margin-bottom: 25px; letter-spacing: -0.5px; color: #000; }
  
  .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
  @media (min-width: 480px) { .grid { grid-template-columns: 1fr 1fr; } }
  
  .input-item label { display: block; font-size: 15px; color: #636366; margin-bottom: 8px; font-weight: 600; padding-left: 4px; }
  .input-item input { width: 100%; padding: 18px; border: none; background: #F2F2F7; border-radius: 16px; font-size: 20px; font-weight: 700; transition: all 0.2s; }
  .input-item input:focus { background: #E5E5EA; outline: none; box-shadow: 0 0 0 4px rgba(83, 74, 183, 0.1); }

  .summary-row { display: flex; justify-content: space-between; padding-top: 25px; margin-top: 25px; border-top: 1px solid #F2F2F7; font-weight: 800; font-size: 22px; }
  .total-val { color: var(--error); }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>'26 CRUISE</h1>
    <p>손익 분석 시뮬레이터</p>
  </header>

  <div class="dash-card" id="main-dash">
    <p class="dash-label">예상 순이익</p>
    <div class="dash-main"><span id="profit-display">0</span> <span style="font-size: 24px; font-weight: 600;">원</span></div>
    
    <div class="visual-box">
      <div class="slider-info">
        <div>
          <span class="dash-label" style="margin-bottom:0">목표 객석 점유율</span>
          <span class="occ-sub" id="occ-detail">0명 (1회당 0명)</span>
        </div>
        <div class="occ-val"><span id="occ-label">80</span>%</div>
      </div>
      
      <input type="range" id="occ-slider" min="0" max="100" value="80" oninput="updateAll()">
      
      <div class="chart-container">
        <canvas id="bepChart"></canvas>
      </div>
      
      <p class="bep-summary">
        총 <span id="bep-audience-display" style="text-decoration: underline;">0</span>명 관람 시 손익분기점(BEP) 달성
      </p>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💸 지출 예산</div>
    <div class="grid">
      <div class="input-item"><label>작품 개발비(로열티)</label><input type="text" id="cost_dev" value="1,763,900" oninput="handleInput(this)"></div>
      <div class="input-item"><label>대관료(공연+연습)</label><input type="text" id="cost_venue" value="11,200,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>배우 인건비</label><input type="text" id="cost_cast" value="6,853,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>창작진 인건비</label><input type="text" id="cost_creative" value="3,000,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>스탭 및 크루 인건비</label><input type="text" id="cost_crew" value="4,000,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>무대/소품 제작비</label><input type="text" id="cost_stage" value="5,000,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>의상 제작비</label><input type="text" id="cost_dress" value="1,500,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>분장 제작비</label><input type="text" id="cost_makeup" value="1,000,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>홍보 마케팅비</label><input type="text" id="cost_mktg" value="5,000,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>프로덕션 진행비</label><input type="text" id="cost_run" value="2,000,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>예비비</label><input type="text" id="cost_reserve" value="1,000,000" oninput="handleInput(this)"></div>
    </div>
    <div class="summary-row">
      <span>총 지출 합계</span>
      <span class="total-val" id="total-cost-display">0원</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🎟 티켓 판매 정보</div>
    <div class="grid">
      <div class="input-item"><label>티켓 정가</label><input type="text" id="faceValue" value="50,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>평균 할인율(%)</label><input type="text" id="discountRate" value="20" oninput="handleInput(this)"></div>
      <div class="input-item"><label>판매 수수료 공제율(%)</label><input type="text" id="commRate" value="10" oninput="handleInput(this)"></div>
      <div class="input-item"><label>부가가치세(%)</label><input type="text" id="vatRate" value="10" oninput="handleInput(this)"></div>
      <div class="input-item"><label>협찬 및 제휴 수익</label><input type="text" id="extra_sp" value="0" oninput="handleInput(this)"></div>
      <div class="input-item"><label>프로그램북 수익</label><input type="text" id="extra_pb" value="0" oninput="handleInput(this)"></div>
      <div class="input-item"><label>공연 횟수(회)</label><input type="text" id="totalShows" value="14" oninput="handleInput(this)"></div>
    </div>
  </div>
</div>

<script>
function handleInput(el) {
  let val = el.value.replace(/[^0-9]/g, '');
  el.value = val ? Number(val).toLocaleString() : '';
  updateAll();
}

function getNum(id) {
  return parseFloat(document.getElementById(id).value.replace(/,/g, '')) || 0;
}

function updateAll() {
  const occ = document.getElementById('occ-slider').value;
  document.getElementById('occ-label').innerText = occ;

  const seatsPerShow = 105; 
  const totalShows = getNum('totalShows');
  const maxAudience = seatsPerShow * totalShows;
  const currentAudience = Math.round(maxAudience * (occ/100));
  
  // 점유율 상세 텍스트 업데이트
  document.getElementById('occ-detail').innerText = `${currentAudience.toLocaleString()}명 (1회당 ${Math.round(currentAudience/totalShows)}명)`;

  // 지출 합계
  const costIds = ['cost_dev','cost_venue','cost_cast','cost_creative','cost_crew','cost_stage','cost_dress','cost_makeup','cost_mktg','cost_run','cost_reserve'];
  const totalCost = costIds.reduce((acc, id) => acc + getNum(id), 0);
  document.getElementById('total-cost-display').innerText = Math.round(totalCost).toLocaleString() + "원";

  // 수입 계산
  const netPerTicket = (getNum('faceValue') * (1 - getNum('discountRate')/100) * (1 - getNum('commRate')/100)) / (1 + getNum('vatRate')/100);
  const extraRev = getNum('extra_sp') + getNum('extra_pb');
  const totalRev = (currentAudience * netPerTicket) + extraRev;
  const profit = totalRev - totalCost;

  // UI 업데이트
  document.getElementById('profit-display').innerText = Math.round(profit).toLocaleString();
  document.getElementById('main-dash').style.backgroundColor = profit >= 0 ? 'var(--cyan)' : 'var(--error)';
  
  const bepAudience = netPerTicket > 0 ? Math.max(0, (totalCost - extraRev) / netPerTicket) : 0;
  document.getElementById('bep-audience-display').innerText = Math.round(bepAudience).toLocaleString();

  updateChart(totalCost, netPerTicket, extraRev, maxAudience, currentAudience);
}

let myChart;
function updateChart(fixedCost, netPerTicket, extraRev, maxAudience, currentAudience) {
  const ctx = document.getElementById('bepChart').getContext('2d');
  
  // X축 데이터: 관객 수 (0명 ~ 만석)
  const labels = [0, maxAudience];
  const costLine = [fixedCost, fixedCost];
  const revLine = [extraRev, extraRev + (maxAudience * netPerTicket)];
  
  // 현재 위치 점 데이터
  const currentRev = extraRev + (currentAudience * netPerTicket);

  if (myChart) myChart.destroy();
  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: '수입 합계',
          data: [{x: 0, y: revLine[0]}, {x: maxAudience, y: revLine[1]}],
          borderColor: '#534AB7', borderWidth: 4, pointRadius: 0, tension: 0
        },
        {
          label: '고정 지출',
          data: [{x: 0, y: fixedCost}, {x: maxAudience, y: fixedCost}],
          borderColor: '#FF3B30', borderWidth: 2, borderDash: [5, 5], pointRadius: 0
        },
        {
          label: '현재 위치',
          data: [{x: currentAudience, y: currentRev}],
          pointBackgroundColor: '#FFF', pointBorderColor: '#534AB7', pointRadius: 8, pointBorderWidth: 4, showLine: false
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 0 },
      scales: {
        x: { type: 'linear', min: 0, max: maxAudience, display: true, grid: { display: false }, title: { display: true, text: '관객 수 (명)', font: { size: 10 } } },
        y: { display: false }
      },
      plugins: { legend: { display: false } }
    }
  });
}

window.onload = updateAll;
</script>
</body>
</html>
