<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>'26 CRUISE 손익 분석 시뮬레이터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --primary: #534AB7; --cyan: #30B0C7; --error: #FF453A;
    --bg: #F2F2F7; --card-bg: #FFFFFF; 
    --text-main: #1C1C1E; --text-sub: #636366; --line-gray: #AEAEB2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Pretendard", sans-serif; background: var(--bg); color: var(--text-main); padding: 20px; font-size: 18px; }
  .container { max-width: 650px; margin: 0 auto; padding-bottom: 80px; }
  
  header { padding: 50px 0 30px; text-align: center; }
  header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; color: var(--text-main); }
  
  .dash-card { background: var(--primary); color: white; border-radius: 32px; padding: 35px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); transition: background-color 0.5s ease; }
  .dash-label { font-size: 16px; opacity: 0.85; font-weight: 500; margin-bottom: 10px; }
  .dash-main { font-size: 46px; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; }
  
  .visual-box { background: rgba(255,255,255,0.12); padding: 25px; border-radius: 26px; margin-top: 10px; }
  .slider-info { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
  .occ-val { font-size: 26px; font-weight: 800; }
  .occ-sub { font-size: 14px; opacity: 0.9; font-weight: 500; display: block; margin-top: 5px; }
  
  input[type=range] { width: 100%; height: 8px; border-radius: 4px; accent-color: white; cursor: pointer; margin: 15px 0 25px; }
  
  .chart-container { background: white; border-radius: 22px; padding: 18px; height: 260px; position: relative; }
  .bep-summary { font-size: 17px; text-align: center; margin-top: 25px; font-weight: 600; color: white; letter-spacing: -0.3px; }

  .card { background: var(--card-bg); border-radius: 30px; padding: 35px; margin-bottom: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.04); }
  .card-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; color: var(--text-main); }
  .card-info { font-size: 14px; color: var(--text-sub); margin-bottom: 25px; font-weight: 500; }
  
  .grid { display: grid; grid-template-columns: 1fr; gap: 22px; }
  @media (min-width: 480px) { .grid { grid-template-columns: 1fr 1fr; } }
  
  .input-item label { display: block; font-size: 14px; color: var(--text-sub); margin-bottom: 10px; font-weight: 600; padding-left: 2px; }
  .input-item input { width: 100%; padding: 18px; border: none; background: #F2F2F7; border-radius: 16px; font-size: 19px; font-weight: 700; color: var(--text-main); }
  .input-item input:focus { background: #EBEBEF; outline: none; }

  .summary-row { display: flex; justify-content: space-between; padding-top: 25px; margin-top: 25px; border-top: 1px solid #F2F2F7; font-weight: 700; font-size: 20px; }
  .total-val { color: var(--error); font-weight: 800; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>'26 CRUISE 손익 분석 시뮬레이터</h1>
  </header>

  <div class="dash-card" id="main-dash">
    <p class="dash-label">예상 순이익</p>
    <div class="dash-main"><span id="profit-display">0</span> <span style="font-size: 22px; font-weight: 600;">원</span></div>
    
    <div class="visual-box">
      <div class="slider-info">
        <div>
          <span class="dash-label" style="margin-bottom:0">유료 객석 점유율 목표</span>
          <span class="occ-sub" id="occ-detail">0명 (1회당 0명)</span>
        </div>
        <div class="occ-val"><span id="occ-label">80</span>%</div>
      </div>
      
      <input type="range" id="occ-slider" min="0" max="100" value="80" oninput="updateAll()">
      
      <div class="chart-container">
        <canvas id="bepChart"></canvas>
      </div>
      
      <p class="bep-summary">
        손익분기점(BEP) <span id="bep-percent-display">0</span>% : 총 <span id="bep-audience-display" style="text-decoration: underline;">0</span>명 유료 관람 시 달성
      </p>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📅 공연 일정 및 좌석 구분</div>
    <p class="card-info">공연장 정보 : 씨어터쿰, 기본 좌석 수 111석</p>
    <div class="grid">
      <div class="input-item"><label>총 공연 횟수(회)</label><input type="text" id="totalShows" value="14" oninput="handleInput(this)"></div>
      <div class="input-item"><label>총 관계자 모니터링(석)</label><input type="text" id="seat_monitor" value="28" oninput="handleInput(this)"></div>
      <div class="input-item"><label>총 초대권(석)</label><input type="text" id="seat_invitation" value="42" oninput="handleInput(this)"></div>
      <div class="input-item"><label>총 시야제한 및 판매불가(석)</label><input type="text" id="seat_unavailable" value="28" oninput="handleInput(this)"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💸 지출 예산</div>
    <div class="grid">
      <div class="input-item"><label>작품 개발비(로열티)</label><input type="text" id="cost_dev" value="1,763,900" oninput="handleInput(this)"></div>
      <div class="input-item"><label>대관료(공연+연습)</label><input type="text" id="cost_venue" value="11,200,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>배우 인건비</label><input type="text" id="cost_cast" value="6,853,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>창작진 인건비</label><input type="text" id="cost_creative" value="3,000,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>스탭 및 크루 인건비</label><input type="text" id="cost_crew" value="4,000,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>무대·소품 제작비</label><input type="text" id="cost_stage" value="5,000,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>조명 제작비</label><input type="text" id="cost_dress" value="1,500,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>의상·분장 제작비</label><input type="text" id="cost_makeup" value="1,000,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>홍보 마케팅비</label><input type="text" id="cost_mktg" value="5,000,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>프로덕션 진행비</label><input type="text" id="cost_run" value="2,000,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>예비비</label><input type="text" id="cost_reserve" value="1,000,000" oninput="handleInput(this)"></div>
    </div>
    <div class="summary-row">
      <span>총 지출 합계</span>
      <span class="total-val" id="total-cost-display">0원</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🎟 티켓 판매</div>
    <div class="grid">
      <div class="input-item"><label>티켓 정가</label><input type="text" id="faceValue" value="50,000" oninput="handleInput(this)"></div>
      <div class="input-item"><label>평균 할인율(%)</label><input type="text" id="discountRate" value="20" oninput="handleInput(this)"></div>
      <div class="input-item"><label>판매 수수료 공제율(%)</label><input type="text" id="commRate" value="10" oninput="handleInput(this)"></div>
      <div class="input-item"><label>부가가치세(%)</label><input type="text" id="vatRate" value="10" oninput="handleInput(this)"></div>
      <div class="input-item"><label>협찬 및 제휴 수익</label><input type="text" id="extra_sp" value="0" oninput="handleInput(this)"></div>
      <div class="input-item"><label>프로그램북 수익</label><input type="text" id="extra_pb" value="0" oninput="handleInput(this)"></div>
    </div>
  </div>
</div>

<script>
function handleInput(el) {
  let val = el.value.replace(/[^0-9]/g, '');
  el.value = val ? Number(val).toLocaleString() : '';
  updateAll();
}

function getNum(id) {
  return parseFloat(document.getElementById(id).value.replace(/,/g, '')) || 0;
}

function updateAll() {
  const occ = document.getElementById('occ-slider').value;
  document.getElementById('occ-label').innerText = occ;

  const totalSeatsInRun = 111 * getNum('totalShows'); 
  const totalNonPaidSeats = getNum('seat_monitor') + getNum('seat_invitation') + getNum('seat_unavailable');
  const maxPaidAudienceTotal = Math.max(0, totalSeatsInRun - totalNonPaidSeats); 
  
  const currentPaidAudience = Math.round(maxPaidAudienceTotal * (occ/100)); 
  const totalShows = getNum('totalShows') || 1;
  
  document.getElementById('occ-detail').innerText = `${currentPaidAudience.toLocaleString()}명 (1회당 평균 ${Math.round(currentPaidAudience/totalShows)}명)`;

  const costIds = ['cost_dev','cost_venue','cost_cast','cost_creative','cost_crew','cost_stage','cost_dress','cost_makeup','cost_mktg','cost_run','cost_reserve'];
  const totalCost = costIds.reduce((acc, id) => acc + getNum(id), 0);
  document.getElementById('total-cost-display').innerText = Math.round(totalCost).toLocaleString() + "원";

  const netPerTicket = (getNum('faceValue') * (1 - getNum('discountRate')/100) * (1 - getNum('commRate')/100)) / (1 + getNum('vatRate')/100);
  const extraRev = getNum('extra_sp') + getNum('extra_pb');
  const totalRev = (currentPaidAudience * netPerTicket) + extraRev;
  const profit = totalRev - totalCost;

  const statusColor = profit >= 0 ? 'var(--cyan)' : 'var(--error)';
  document.getElementById('profit-display').innerText = Math.round(profit).toLocaleString();
  document.getElementById('main-dash').style.backgroundColor = statusColor;
  
  // BEP 계산 및 퍼센트 산출 로직
  const bepAudience = netPerTicket > 0 ? Math.max(0, (totalCost - extraRev) / netPerTicket) : 0;
  const bepPercent = maxPaidAudienceTotal > 0 ? (bepAudience / maxPaidAudienceTotal * 100) : 0;

  document.getElementById('bep-audience-display').innerText = Math.round(bepAudience).toLocaleString();
  document.getElementById('bep-percent-display').innerText = bepPercent.toFixed(1); // 소수점 한자리까지 표시

  updateChart(totalCost, netPerTicket, extraRev, maxPaidAudienceTotal, currentPaidAudience, statusColor);
}

let myChart;
function updateChart(fixedCost, netPerTicket, extraRev, maxAudience, currentAudience, statusColor) {
  const ctx = document.getElementById('bepChart').getContext('2d');
  const currentRev = extraRev + (currentAudience * netPerTicket);

  if (myChart) myChart.destroy();
  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: '매출 합계',
          data: [{x: 0, y: extraRev}, {x: maxAudience, y: extraRev + (maxAudience * netPerTicket)}],
          borderColor: statusColor,
          borderWidth: 3.5, pointRadius: 0, tension: 0, showLine: true
        },
        {
          label: '지출 예산',
          data: [{x: 0, y: fixedCost}, {x: maxAudience, y: fixedCost}],
          borderColor: '#8E8E93',
          borderWidth: 2, borderDash: [6, 4], pointRadius: 0, showLine: true
        },
        {
          label: '현재 위치',
          data: [{x: currentAudience, y: currentRev}],
          pointBackgroundColor: '#FFF', pointBorderColor: statusColor, 
          pointRadius: 8, pointBorderWidth: 4, showLine: false
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 0 },
      scales: {
        x: { 
          type: 'linear', min: 0, max: maxAudience, 
          title: { display: true, text: '총 유료 관객 수 (명)', font: { size: 11, weight: '600' }, color: '#8E8E93' },
          grid: { display: false }, ticks: { color: '#AEAEB2' }
        },
        y: { 
          display: true, position: 'right',
          ticks: { callback: (v) => v.toLocaleString(), font: { size: 9 }, color: '#AEAEB2' },
          grid: { color: '#F2F2F7' }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(28, 28, 30, 0.9)',
          padding: 12, cornerRadius: 10, displayColors: false,
          callbacks: {
            label: (ctx) => ctx.datasetIndex === 2 ? [`유료 관객: ${ctx.parsed.x.toLocaleString()}명`, `매출: ${Math.round(ctx.parsed.y).toLocaleString()}원`] : null
          }
        }
      }
    }
  });
}

window.onload = updateAll;
</script>
</body>
</html>
